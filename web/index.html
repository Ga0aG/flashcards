</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    var _ttsAudio = new Audio();

    var _langToYoudao = {
      'ja-JP': 'jap',
      'en-US': 'eng',
      'zh-CN': 'zh',
      'it-IT': 'it',
      'es-ES': 'es',
    };

    window.ttsSpeak = function(text, lang) {
      var le = _langToYoudao[lang] || 'eng';
      var url = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&le=' + le;
      console.log('[TTS] playing:', url);
      _ttsAudio.pause();
      _ttsAudio.src = url;
      _ttsAudio.play().then(function() {
        console.log('[TTS] play started');
      }).catch(function(e) {
        console.error('[TTS] play error:', e);
      });
    };

    window.ttsStop = function() {
      _ttsAudio.pause();
    };
  </script>
</body>
</html>
